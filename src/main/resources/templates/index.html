    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.7.1/Chart.min.js"></script>
</head>

<body>
    <div class="header">
		<div class="logo"><a th:href="@{/index}">BudgetBook</a></div>
		<u><a th:href="@{/registration}" style="margin-left: 30px;">新規登録</a></u>
		<u><a th:href="@{/index}" style="margin-left: 20px;">一覧</a></u>
    </div>
    <div class="main">

<!--            @if($sums["sum"]!=0)-->
<!--            <div style="width:450px; height:225px; margin-bottom:20px">-->

<!--            </div>-->
<!--            @endif-->

<!--        @if(session("advice"))-->

<!--        </div>-->
<!--        @endif-->
        <div class="table_top">
            <h4 style="margin-right:auto">入出金履歴</h4>
            <button type="button" class="btn btn-success" th:onclick='|location.href="@{/registration}"|'>追加</button>
            <button type="button" class="btn btn-success" th:onclick='|location.href="@{/advice}"|'>AIにアドバイスを依頼</button>
        </div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">種類</th>
                    <th scope="col">内容</th>
                    <th scope="col">金額</th>
                    <th scope="col">日付</th>
                    <th scope="col" style="width:150px">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each=transaction:${transactions} >
					<td th:if="${transaction.flow == 'expense'}">支出</td>
					<td th:unless="${transaction.flow == 'expense'}">収入</td>
                    <td th:text=${transaction.name}></td>
					<td th:text=${transaction.price}></td>
					<td th:text=${transaction.dateString}></td>					
                    <td style="width:150px"><button class="btn btn-primary btn-sm" onclick='location.href="{{ route("edit",$transaction->id) }}"'>編集</button>
                        <button class="btn btn-danger btn-sm" onclick='location.href="{{ route("delete",$transaction->id) }}"'>削除</button>
                    </td>
                </tr>
            </tbody>
        </table>

</body>
