<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBook-regisration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/base.css}">

</head>

<body>
    <div class="header">
        <div class="logo"><a th:href="@{/index}">BudgetBook</a></div>
        <u><a th:href="@{/registration}" style="margin-left: 30px;">新規登録</a></u>
        <u><a th:href="@{/index}" style="margin-left: 20px;">一覧</a></u>

    </div>
    <div class=main>
        <div class="regisration_form">
            <form th:action="@{/registration/submit/{id}(id=${editId})}" method="POST" th:object="${transactionForm}">

			<h3>新規登録</h3>
                <p style="margin: 10px 0;">
                    <div th:if="${transactionForm.flow == 'income'}">
						<input type="radio" id="income" name="flow" value="income" class="form-check-input" checked>
	                    <label for="income" class="form-check-label">収入</label>
	                    <input type="radio" id="expense" name="flow" value="expense" class="form-check-input">
	                    <label for="expense" class="form-check-label">支出</label>
                    </div>
					<div th:th:unless="${transactionForm.flow == 'income'}">
						<input type="radio" id="income" name="flow" value="income" class="form-check-input">
					    <label for="income" class="form-check-label">収入</label>
					    <input type="radio" id="expense" name="flow" value="expense" class="form-check-input"  checked>
					    <label for="expense" class="form-check-label">支出</label>
					</div>
                </p>
                <label for="name" class="form-label">内容</label>
                <input type="text" th:field="*{name}" class="form-control" required>

                <label for="price" class="form-label">金額</label>
                <input type="number" th:field="*{price}" id="price" name="price" class="form-control" required>

                <label for="genre" class="form-label">ジャンル</label>
                <select id="genre" th:field="*{genre}" class="form-select">
                    <option value="">選択</option>
                    <option value="salary">給与</option>
                    <option value="side_income">副収入</option>
                    <!-- 支出 -->
                    <option value="fixed">固定費</option>
                    <option value="food">食費</option>
                    <option value="daily_necessities">日用品</option>
                    <option value="beauty">美容</option>
                    <option value="entertainment">交際費</option>
                    <option value="other">その他</option>
                </select>

                <label for="date" class="form-label">日付</label>
                <input type="date" th:field="*{date}" class="form-control" required>

                <button type="submit" class="btn btn-primary" style="margin-top: 10px;">登録</button>

            </form>
        </div>
    </div>
</body>

</html>
